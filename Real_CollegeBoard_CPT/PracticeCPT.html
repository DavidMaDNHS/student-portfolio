<!DOCTYPE html>
<html>
<head>
    <title>My Practice CPT</title>
    <style>
        /* This styles the whole page */
        body {background-color: #f0f0f0; text-align: center; font-family: "Times New Roman", Times, serif; padding: 50px;}
        /* This Creates the 'Box' (The Container) */
        .main-container {background-color: white; border: 5px  solid #007bff; padding: 30px; margin 50px auto; width: 400px; border-radius: 15px;}
        /* This styles the Button */
        button {background-color: green; color: white; padding: 10px 20px; border: solid darkgreen 2px; border-radius: 5px; cursor: pointer;}
    </style>
    <body>
        <div class="main-container">
            <h1>My Club Finder</h1>
            <p> Enter a club name below:</p>
            <input type="text" id="userInput" placeholder="Ex Chess"><br><br>
            <button>Search</button>
        </div>
    </body>
</head>
</html>
